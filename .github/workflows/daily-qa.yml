name: Daily QA Tests

on:
  schedule:
    # Run every day at 9 AM UTC (1 AM PST, 4 AM EST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering
  push:
    branches: [main]
    paths:
      - 'components/activity/**'
      - 'lib/**'
      - 'app/**'

jobs:
  qa-tests:
    name: Run QA Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_CLOUD_TTS_KEY: ${{ secrets.GOOGLE_CLOUD_TTS_KEY }}

      - name: Run Playwright tests
        run: npm run test:e2e
        continue-on-error: true
        env:
          CI: true

      - name: Generate test report
        if: always()
        run: |
          echo "# QA Test Report - $(date '+%Y-%m-%d %H:%M:%S')" > test-report.md
          echo "" >> test-report.md
          if [ -f test-results/results.json ]; then
            echo "## Test Results" >> test-report.md
            echo "\`\`\`json" >> test-report.md
            cat test-results/results.json >> test-report.md
            echo "\`\`\`" >> test-report.md
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-test-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
            test-report.md
          retention-days: 30

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🤖 QA Test Results\n\n';

            if (fs.existsSync('test-report.md')) {
              const report = fs.readFileSync('test-report.md', 'utf8');
              comment += report;
            }

            comment += '\n\n[View full Playwright report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Daily QA Tests Failed - ' + new Date().toISOString().split('T')[0],
              body: `The daily QA test suite has failed.

            **Run Details:**
            - Run ID: ${{ github.run_id }}
            - Commit: ${{ github.sha }}
            - [View Test Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            Please review the failed tests and fix any issues.

            ### Quick Actions:
            - [ ] Review test failures
            - [ ] Identify root cause
            - [ ] Fix bugs
            - [ ] Re-run tests
            - [ ] Close issue when resolved
            `,
              labels: ['bug', 'qa-failure', 'automated']
            });

  # Separate job for speech quality tests
  speech-quality-tests:
    name: Speech Quality Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run speech quality tests
        run: npx playwright test tests/e2e/speech-quality.spec.ts
        continue-on-error: true

      - name: Upload speech test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: speech-quality-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # Generate comprehensive report
  generate-report:
    name: Generate QA Report
    needs: [qa-tests, speech-quality-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate comprehensive report
        run: |
          echo "# 📊 Daily QA Report" > daily-report.md
          echo "Generated: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> daily-report.md
          echo "" >> daily-report.md
          echo "## Test Suite Summary" >> daily-report.md
          echo "" >> daily-report.md

          # Add summary for each test suite
          echo "### Main QA Tests" >> daily-report.md
          if [ -d "qa-test-results-${{ github.run_number }}" ]; then
            echo "✅ Results available" >> daily-report.md
          else
            echo "❌ No results found" >> daily-report.md
          fi
          echo "" >> daily-report.md

          echo "### Speech Quality Tests" >> daily-report.md
          if [ -d "speech-quality-results" ]; then
            echo "✅ Results available" >> daily-report.md
          else
            echo "❌ No results found" >> daily-report.md
          fi

      - name: Upload comprehensive report
        uses: actions/upload-artifact@v4
        with:
          name: daily-qa-report-${{ github.run_number }}
          path: daily-report.md
          retention-days: 90
